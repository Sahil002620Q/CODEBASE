<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data Collection</title>
    <style>
        /* Modern UI Styling */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 450px; 
        }
        h2 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 25px;
            font-size: 24px;
        }
        .form-group { margin-bottom: 18px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #444; 
            font-size: 14px;
        }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e1e1e1; 
            border-radius: 6px; 
            box-sizing: border-box; 
            transition: border-color 0.3s ease;
            font-size: 15px;
        }
        input:focus, textarea:focus { 
            border-color: #667eea; 
            outline: none; 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #667eea; 
            border: none; 
            color: white; 
            font-size: 16px; 
            font-weight: bold;
            border-radius: 6px; 
            cursor: pointer; 
            transition: background 0.3s ease;
            margin-top: 10px;
        }
        button:hover { background-color: #5a67d8; }
        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Information</h2>
    
    <form action="https://formspree.io/f/mojkvabw" method="POST">
        
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="Student_Name" placeholder="Enter full name" required>
        </div>

        <div class="form-group">
            <label>Stream</label>
            <input type="text" name="Stream" placeholder="e.g. Science / Commerce" required>
        </div>

        <div class="form-group">
            <label>Section & Roll Number</label>
            <input type="text" name="Roll_No" placeholder="e.g. B-45" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="Phone" placeholder="10-digit mobile number" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="Email" placeholder="email@example.com" required>
        </div>

        <div class="form-group">
            <label>Full Address</label>
            <textarea name="Address" rows="3" placeholder="Enter your home address" required></textarea>
        </div>

        <input type="hidden" name="_subject" value="New Student Submission!">

        <button type="submit">Submit & Save</button>
    </form>

    <div class="footer-note">Secure Data Submission</div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Data Entry</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #2c3e50; text-align: center; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2980b9; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #3498db; }
        #msg { text-align: center; margin-top: 10px; color: green; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Secure Submission</h2>
    <form id="google-sheet-form">
        <input type="text" name="Name" placeholder="Full Name" required>
        <input type="text" name="Stream" placeholder="Stream" required>
        <input type="text" name="Roll_No" placeholder="Roll Number" required>
        <input type="tel" name="Phone" placeholder="Phone Number" required>
        <input type="email" name="Email" placeholder="Email Address" required>
        <textarea name="Address" placeholder="Address" rows="3" required></textarea>
        <button type="submit" id="submitBtn">Save to Excel</button>
    </form>
    <p id="msg">Data saved successfully!</p>
</div>

<script>
    const scriptURL = 'YOUR_GOOGLE_SCRIPT_URL_HERE'; // PASTE YOUR URL HERE
    const form = document.getElementById('google-sheet-form');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerHTML = "Saving...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                msg.style.display = "block";
                form.reset();
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').innerHTML = "Save to Excel";
                setTimeout(() => { msg.style.display = "none"; }, 5000);
            })
            .catch(error => console.error('Error!', error.message));
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .login-container {
  width: 300px;
  margin: 50px auto;
  padding: 20px;
  border: 1px solid #ccc;
  border-radius: 25px;
  height: 400px;
}

.img-btn{
  padding: 0px;
  background: none;
  border: none;
  cursor: pointer;
}

.img-btn img {
  width: 30px;
  height: 30px;
  display: block;
}

.login-container h2 {
  text-align: center;
}

.login-container input {
  width: 90%;
  padding: 10px;
  margin: 5px 0;
}

.submit {
  width: 98%;
  padding: 10px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.login-container button:hover {
  background: #0056b3;
}
    </style>
</head>
<body>
    

    <div class="login-container">
  <h2>Login</h2>
  <form>
    <input type="text" placeholder="Username" required>
    <input type="password" placeholder="Password" required>
    <button class="img-btn"><img class="img-btn" src="google..png" alt="icon"></button>
    <button class="img-btn"><img class="img-btn" src="google..png" alt="icon"></button>
    <button class="submit">Login</button>
  </form>
</div>

</body>
</html>
